<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensagem enviada | Henrique.Dev</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #152238;
      color: #ffffff;
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      padding: 40px 28px;
      text-align: center;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 20px 44px rgba(0, 0, 0, 0.22);
    }

    .icon {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      margin: 0 auto 22px;
      border-radius: 50%;
      background: rgba(56, 223, 248, 0.14);
      color: #38dff8;
      font-size: 32px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 2rem;
    }

    p {
      margin: 0;
      color: #d8dee9;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 28px;
      padding: 14px 24px;
      border-radius: 10px;
      background: #38dff8;
      color: #07111d;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">✓</div>

    <h1>Mensagem enviada!</h1>

    <p>
      Recebi sua solicitação com sucesso.
      Em breve entrarei em contato pelo WhatsApp ou e-mail informado.
    </p>

    <a href="/">Voltar para o portfólio</a>
  </main>
</body>
</html>
